    <style>
        :root {
            --bg: #030303;
            --fg: #fafafa;
            --muted: #a3a3a3;
            --muted-soft: #737373;
            --muted-dim: #525252;
            --gold: #d4af37;
            --gold-soft: #c4a35a;
            --font-display: "Plus Jakarta Sans", system-ui, sans-serif;
            --font-name: "Cormorant Garamond", Georgia, "Times New Roman", serif;
            --font-sans: "Outfit", system-ui, sans-serif;
            --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            min-height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            min-height: 100dvh;
            overflow-x: hidden;
        }

        ::selection {
            background: #fff;
            color: #000;
        }

        .shell {
            position: relative;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            color: var(--fg);
        }

        /* Full-bleed portrait */
        .backdrop {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: var(--bg);
        }
        .backdrop img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* City skyline portrait — keep face mid-frame, horizon visible */
            object-position: 50% 32%;
            opacity: 0.62;
            transition: opacity 0.7s var(--ease-out);
        }
        .shell:has(.face-hit:hover) .backdrop img,
        .shell:has(.face-hit:focus-visible) .backdrop img {
            opacity: 0.78;
        }

        .veil-top {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(3, 3, 3, 0.92) 0%, transparent 42%, transparent 55%, rgba(3, 3, 3, 0.55) 100%);
        }
        .veil-side {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(to right, rgba(3, 3, 3, 0.82) 0%, transparent 48%, rgba(3, 3, 3, 0.35) 100%);
        }
        .veil-bottom {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 55%;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(to top, #030303 0%, rgba(3, 3, 3, 0.85) 35%, transparent 100%);
        }
        .grain {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            opacity: 0.12;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 180px 180px;
        }

        /* Clickable figure zone → email */
        .face-hit {
            position: absolute;
            top: 22%;
            bottom: 22%;
            left: 30%;
            right: 30%;
            z-index: 5;
            cursor: pointer;
            border-radius: 0.75rem;
        }
        .face-hit:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 4px;
        }
        @media (min-width: 768px) {
            .face-hit {
                top: 18%;
                bottom: 18%;
                left: 34%;
                right: 34%;
            }
        }

        .content {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100dvh;
            padding: clamp(1.25rem, 4vw, 2.5rem);
            pointer-events: none;
        }
        .content a,
        .content button {
            pointer-events: auto;
        }

        .top {
            display: flex;
            align-items: flex-start;
        }

        .identity {
            opacity: 0;
            transform: translateY(12px);
            animation: rise 1s var(--ease-out) 0.15s forwards;
        }
        h1 {
            font-family: var(--font-name);
            font-size: clamp(2.35rem, 6.5vw, 3.75rem);
            font-weight: 500;
            letter-spacing: 0.01em;
            line-height: 1.05;
            margin-bottom: 0.65rem;
            font-feature-settings: "liga" 1, "kern" 1;
        }
        .role {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
        }
        @media (min-width: 768px) {
            .role { font-size: 0.875rem; }
        }

        .bottom {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0.85rem;
            width: min(100%, 22rem);
            margin-top: 6rem;
            opacity: 0;
            transform: translateY(16px);
            animation: rise 1.1s var(--ease-out) 0.5s forwards;
        }
        @media (min-width: 768px) {
            .bottom {
                margin-top: 0;
                margin-left: auto;
            }
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.35rem;
            width: 100%;
        }
        .actions a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 2.75rem;
            padding: 0.4rem 0.5rem;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            border: 1px solid transparent;
            border-radius: 999px;
            transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease;
        }
        .actions a:hover,
        .actions a:focus-visible {
            color: var(--fg);
            border-color: rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.06);
        }
        .actions a:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 2px;
        }

        .social {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            width: 100%;
            gap: 0;
        }
        .social a {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 2.75rem;
            color: var(--muted-soft);
            transition: color 0.3s ease, transform 0.3s var(--ease-out);
        }
        .social a svg {
            width: 1.2rem;
            height: 1.2rem;
            fill: currentColor;
            display: block;
        }
        .social a:hover,
        .social a:focus-visible {
            color: #fff;
            transform: translateY(-2px) scale(1.08);
        }
        .social a:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 3px;
            border-radius: 4px;
        }

        @keyframes rise {
            to { opacity: 1; transform: none; }
        }

        @media (prefers-reduced-motion: reduce) {
            .identity, .bottom {
                animation: none;
                opacity: 1;
                transform: none;
            }
            .backdrop img { transition: none; }
            .social a { transition: color 0.2s ease; }
            .social a:hover, .social a:focus-visible { transform: none; }
        }

        @media (max-width: 480px) {
            .actions a { letter-spacing: 0.12em; font-size: 0.65rem; }
            .bottom { margin-top: 4.5rem; width: min(100%, 20rem); }
        }
    </style>
