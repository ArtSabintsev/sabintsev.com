    <style>
        :root {
            --bg: #0a0806;
            --fg: #fcf6eb;
            --ivory: #fcf6eb;
            --muted: #b8a98a;
            --muted-soft: #8a7d66;
            --gold: #d4af37;
            --gold-light: #f4e1a1;
            --gold-dark: #8b6608;
            --gold-deep: #6e4f05;
            --hairline-gold: rgba(212, 175, 55, 0.35);
            --hairline-gold-soft: rgba(212, 175, 55, 0.18);
            --font-display: "Cinzel", Georgia, "Times New Roman", serif;
            --font-ui: "Inter", system-ui, sans-serif;
            --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            min-height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-ui);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            min-height: 100dvh;
            overflow-x: hidden;
        }

        ::selection {
            background: var(--gold);
            color: var(--bg);
        }

        .shell {
            position: relative;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            color: var(--fg);
        }

        /* Full-bleed portrait */
        .backdrop {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: var(--bg);
        }
        .backdrop img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: 50% 22%;
            opacity: 0.62;
            transition: opacity 0.7s var(--ease-out), transform 0.7s var(--ease-out);
            transform: scale(1.02);
            filter: saturate(0.92) contrast(1.05);
        }
        .shell:has(.face-hit:hover) .backdrop img,
        .shell:has(.face-hit:focus-visible) .backdrop img {
            opacity: 0.78;
            transform: scale(1.04);
        }

        .veil-top {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(
                to bottom,
                rgba(10, 8, 6, 0.94) 0%,
                rgba(10, 8, 6, 0.45) 28%,
                transparent 48%,
                transparent 52%,
                rgba(10, 8, 6, 0.5) 100%
            );
        }
        .veil-side {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(
                to right,
                rgba(10, 8, 6, 0.88) 0%,
                transparent 46%,
                rgba(10, 8, 6, 0.4) 100%
            );
        }
        .veil-bottom {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 58%;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(
                to top,
                #0a0806 0%,
                rgba(10, 8, 6, 0.92) 28%,
                rgba(10, 8, 6, 0.55) 55%,
                transparent 100%
            );
        }
        .veil-gold {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(
                ellipse 70% 55% at 50% 28%,
                rgba(212, 175, 55, 0.08) 0%,
                transparent 65%
            );
        }
        .grain {
            position: absolute;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            opacity: 0.1;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 180px 180px;
        }

        /* Double-line Art Deco frame */
        .frame {
            position: fixed;
            inset: 0.85rem;
            z-index: 4;
            pointer-events: none;
            border: 1px solid var(--hairline-gold-soft);
        }
        .frame::before {
            content: "";
            position: absolute;
            inset: 0.4rem;
            border: 1px solid rgba(212, 175, 55, 0.12);
        }
        .frame-corner {
            position: absolute;
            width: 1.1rem;
            height: 1.1rem;
            border-color: var(--gold);
            border-style: solid;
            opacity: 0.75;
        }
        .frame-corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .frame-corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
        .frame-corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
        .frame-corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
        @media (min-width: 768px) {
            .frame { inset: 1.15rem; }
            .frame::before { inset: 0.5rem; }
            .frame-corner { width: 1.35rem; height: 1.35rem; }
        }

        /* Clickable face zone → email */
        .face-hit {
            position: absolute;
            top: 14%;
            bottom: 28%;
            left: 22%;
            right: 22%;
            z-index: 5;
            cursor: pointer;
            border-radius: 50%;
        }
        .face-hit:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 4px;
        }
        @media (min-width: 768px) {
            .face-hit {
                top: 8%;
                bottom: 18%;
                left: 32%;
                right: 32%;
            }
        }

        .content {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100dvh;
            padding: clamp(1.75rem, 5vw, 3rem);
            pointer-events: none;
        }
        .content a {
            pointer-events: auto;
        }

        .top {
            display: flex;
            align-items: flex-start;
        }

        .identity {
            opacity: 0;
            transform: translateY(12px);
            animation: rise 1s var(--ease-out) 0.15s forwards;
        }
        h1 {
            font-family: var(--font-display);
            font-size: clamp(1.35rem, 3.8vw, 2.15rem);
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            line-height: 1.2;
            margin-bottom: 0.85rem;
            color: var(--ivory);
        }
        .role {
            font-family: var(--font-display);
            font-style: italic;
            font-weight: 500;
            font-size: clamp(0.8rem, 1.6vw, 0.95rem);
            letter-spacing: 0.08em;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            width: 5.5rem;
        }
        .divider .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--hairline-gold), transparent);
        }
        .divider .dot {
            width: 5px;
            height: 5px;
            transform: rotate(45deg);
            background: var(--gold);
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.35);
        }

        .bottom {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.25rem;
            margin-top: 5.5rem;
            align-items: end;
            opacity: 0;
            transform: translateY(16px);
            animation: rise 1.1s var(--ease-out) 0.45s forwards;
        }
        @media (min-width: 768px) {
            .bottom {
                grid-template-columns: repeat(12, minmax(0, 1fr));
                gap: 3rem;
                margin-top: 0;
            }
        }

        .headline-block {
            max-width: 36rem;
        }
        @media (min-width: 768px) {
            .headline-block { grid-column: span 7; }
        }
        @media (min-width: 1280px) {
            .headline-block { grid-column: span 6; }
        }
        .headline {
            font-family: var(--font-display);
            font-weight: 400;
            font-size: clamp(1.25rem, 2.8vw, 1.85rem);
            line-height: 1.35;
            letter-spacing: 0.04em;
            color: rgba(252, 246, 235, 0.92);
            text-wrap: balance;
        }
        .headline span { display: block; }
        .headline em {
            font-style: italic;
            font-weight: 500;
            color: var(--gold-light);
        }

        .aside {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 1.35rem;
        }
        @media (min-width: 768px) {
            .aside {
                grid-column: span 5;
                align-items: flex-end;
                text-align: right;
            }
        }
        @media (min-width: 1280px) {
            .aside { grid-column: span 6; }
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
        }
        @media (min-width: 768px) {
            .actions { justify-content: flex-end; }
        }
        .actions a {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 2.85rem;
            padding: 0.55rem 1.15rem;
            color: var(--ivory);
            text-decoration: none;
            font-family: var(--font-display);
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border: 1px solid var(--hairline-gold);
            background: rgba(10, 8, 6, 0.35);
            overflow: hidden;
            isolation: isolate;
            transition: border-color 0.25s ease, color 0.25s ease, transform 0.25s var(--ease-out);
        }
        .actions a::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 0;
            background: var(--gold-deep);
            transform: translateY(101%);
            transition: transform 0.45s var(--ease-out);
        }
        .actions a span {
            position: relative;
            z-index: 1;
        }
        .actions a:hover::before,
        .actions a:focus-visible::before {
            transform: translateY(0);
        }
        .actions a:hover,
        .actions a:focus-visible {
            border-color: var(--gold);
            color: var(--ivory);
            transform: translateY(-1px);
        }
        .actions a:focus-visible {
            outline: 2px solid var(--gold-light);
            outline-offset: 3px;
        }
        .actions a.primary {
            border-color: rgba(212, 175, 55, 0.55);
            color: var(--gold-light);
        }
        .actions a.primary:hover,
        .actions a.primary:focus-visible {
            color: var(--ivory);
        }

        .social {
            display: grid;
            grid-template-columns: repeat(4, minmax(2.75rem, auto));
            gap: 0.25rem 0.35rem;
        }
        @media (min-width: 768px) {
            .social { justify-content: end; }
        }
        .social a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2.75rem;
            height: 2.75rem;
            color: var(--muted-soft);
            transition: color 0.25s ease, transform 0.3s var(--ease-out);
        }
        .social a svg {
            width: 1.15rem;
            height: 1.15rem;
            fill: currentColor;
        }
        .social a:hover,
        .social a:focus-visible {
            color: var(--gold);
            transform: translateY(-2px);
        }
        .social a:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 3px;
            border-radius: 2px;
        }

        @keyframes rise {
            to { opacity: 1; transform: none; }
        }

        @media (prefers-reduced-motion: reduce) {
            .identity, .bottom {
                animation: none;
                opacity: 1;
                transform: none;
            }
            .backdrop img { transition: none; transform: none; }
            .actions a::before { transition: none; }
            .social a { transition: color 0.2s ease; }
            .social a:hover, .social a:focus-visible { transform: none; }
            .actions a:hover, .actions a:focus-visible { transform: none; }
        }

        @media (max-width: 480px) {
            .actions a {
                letter-spacing: 0.14em;
                padding-inline: 0.9rem;
                font-size: 0.68rem;
            }
            .bottom { margin-top: 4rem; }
            h1 { letter-spacing: 0.1em; }
            .frame { inset: 0.55rem; }
        }
    </style>
</head>
